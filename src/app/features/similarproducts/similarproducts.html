<section id="similar-products" class="py-10">
  <div class="container mx-auto px-4">
    <div class="flex justify-between items-center mb-6">
      <div class="flex items-center gap-3">
        <div class="h-8 w-1.5 bg-linear-to-b from-emerald-500 to-emerald-700 rounded-full"></div>
        <h2 class="text-2xl font-bold text-gray-800">
          You May Also <span class="text-emerald-600">Like</span>
        </h2>
      </div>
    </div>

    @if (loading()) {
      <div class="text-center py-8 text-gray-500">
        <p>Loading similar products...</p>
      </div>
    } @else if (products().length > 0) {
      <div class="relative">
        <button
          (click)="scroll('left')"
          class="absolute -left-1 top-1/2 -translate-y-1/2 z-10 bg-white h-8 w-8 rounded-full flex items-center justify-center shadow-md hover:bg-gray-50 transition"
          title="Scroll left"
        >
          <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>

        <div #scrollContainer class="flex gap-4 overflow-x-auto scroll-smooth scrollbar-hide px-2 py-1">
          @for (product of products(); track product._id) {
            <div class="min-w-[280px] max-w-[280px]">
              <app-featureproducts [products]="[product]" />
            </div>
          }
        </div>

        <button
          (click)="scroll('right')"
          class="absolute -right-1 top-1/2 -translate-y-1/2 z-10 bg-white h-8 w-8 rounded-full flex items-center justify-center shadow-md hover:bg-gray-50 transition"
          title="Scroll right"
        >
          <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    } @else {
      <div class="text-center py-8 text-gray-500">
        <p>No similar products found.</p>
      </div>
    }
  </div>
</section>
