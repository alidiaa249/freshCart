<div class="Toastify__toast-container">
  @for (toast of toasts(); track toast.id) {
    <div
      id="{{ toast.id }}"
      tabindex="0"
      data-in="true"
      class="Toastify__toast Toastify__toast-theme--light Toastify__toast--{{ toast.type }} Toastify__toast--close-on-click"
      role="alert"
      (click)="dismiss(toast.id)"
    >
      <div class="Toastify__toast-icon Toastify--animate-icon Toastify__zoom-enter">
        @if (toast.type === 'success') {
          <svg viewBox="0 0 24 24" width="100%" height="100%" fill="var(--toastify-icon-color-success)">
            <path d="M12 0a12 12 0 1012 12A12.014 12.014 0 0012 0zm6.927 8.2l-6.845 9.289a1.011 1.011 0 01-1.43.188l-4.888-3.908a1 1 0 111.25-1.562l4.076 3.261 6.227-8.451a1 1 0 111.61 1.183z"></path>
          </svg>
        } @else if (toast.type === 'error') {
          <svg viewBox="0 0 24 24" width="100%" height="100%" fill="var(--toastify-icon-color-error)">
            <path d="M12 0a12 12 0 100 24 12 12 0 000-24zm5 15.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"></path>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" width="100%" height="100%" fill="var(--toastify-icon-color-info)">
            <path d="M12 0a12 12 0 100 24 12 12 0 000-24zm1 17h-2v-2h2v2zm0-4h-2V7h2v6z"></path>
          </svg>
        }
      </div>
      {{ toast.message }}
      <button class="Toastify__close-button Toastify__close-button--light" type="button" aria-label="close" (click)="dismiss(toast.id); $event.stopPropagation()">
        <svg aria-hidden="true" viewBox="0 0 14 16">
          <path fill-rule="evenodd" d="M7.71 8.23l3.75 3.75-1.48 1.48-3.75-3.75-3.75 3.75L1 11.98l3.75-3.75L1 4.48 2.48 3l3.75 3.75L9.98 3l1.48 1.48-3.75 3.75z"></path>
        </svg>
      </button>
      <div class="Toastify__progress-bar--wrp" data-hidden="false">
        <div class="Toastify__progress-bar--bg Toastify__progress-bar-theme--light Toastify__progress-bar--{{ toast.type }}"></div>
        <div
          role="progressbar"
          aria-hidden="false"
          aria-label="notification timer"
          class="Toastify__progress-bar Toastify__progress-bar--animated Toastify__progress-bar-theme--light Toastify__progress-bar--{{ toast.type }}"
          [style.animation-duration.ms]="3000"
          [style.animation-play-state]="'running'"
        ></div>
      </div>
    </div>
  }
</div>
